name: Verified asset regression

on:
  pull_request:
    branches: [main]
  push:
    branches: [dev/aethervoice-verified-assets]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: python -m pip install --upgrade pip pytest && python -m pip install -e .
      - name: Verified asset and migration regressions
        run: >-
          python -m pytest -q
          tests/test_verified_assets.py
          tests/test_planner.py
          tests/test_patcher.py
          tests/test_apply.py
